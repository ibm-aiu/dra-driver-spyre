---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "dra-driver-spyre.fullname" . }}-role-binding
  namespace: {{ include "dra-driver-spyre.namespace" . }}
subjects:
- kind: ServiceAccount
  name: {{ include "dra-driver-spyre.serviceAccountName" . }}
  namespace: {{ include "dra-driver-spyre.namespace" . }}
roleRef:
  kind: ClusterRole
  name: {{ include "dra-driver-spyre.fullname" . }}-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "dra-driver-spyre.fullname" . }}-privileged-role-binding
subjects:
- kind: ServiceAccount
  name: {{ include "dra-driver-spyre.serviceAccountName" . }}
  namespace: {{ include "dra-driver-spyre.namespace" . }}
roleRef:
  kind: ClusterRole
  name: {{ include "dra-driver-spyre.fullname" . }}-privileged-role
  apiGroup: rbac.authorization.k8s.io
