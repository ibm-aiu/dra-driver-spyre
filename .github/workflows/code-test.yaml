name: Source Code Test

on:
  push:
    branches:
    - main
    paths:
    - api/**
    - cmd/**
    - pkg/**
    - internal/**
    - test/**
    - go.mod
    - go.sum
    - Makefile
    - Dockerfile
    - .github/workflows/unit-test.yaml
    - .github/workflows/e2e-test-kind.yaml
    - .github/workflows/code-test.yaml

permissions: read-all

jobs:
  unit-test:
    uses: ibm-aiu/dra-driver-spyre/.github/workflows/unit-test.yaml@main
  e2e-test-kind:
    needs: unit-test
    uses: ibm-aiu/dra-driver-spyre/.github/workflows/e2e-test-kind.yaml@main
