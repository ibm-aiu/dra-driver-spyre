name: Pull Request Workflow

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]

permissions: read-all

jobs:
  pre-commit:
    uses: ibm-aiu/dra-driver-spyre/.github/workflows/pre-commit.yaml@main
  unit-test:
    needs: pre-commit
    uses: ibm-aiu/dra-driver-spyre/.github/workflows/unit-test.yaml@main
  e2e-test:
    if: contains(github.event.pull_request.labels.*.name, 'ok-to-test')
    uses: ibm-aiu/dra-driver-spyre/.github/workflows/e2e-test-kind.yaml@main
