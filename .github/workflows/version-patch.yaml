name: Version Patch Workflow

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
        - minor
        - major

permissions:
  contents: write
  pull-requests: write

env:
  GOTOOLCHAIN: auto

jobs:
  version-patch:
    uses: ibm-aiu/spyre-operator-actions/.github/workflows/version-patch.yaml@main
    with:
      version_bump: ${{ inputs.version_bump }}

  update-helm-charts:
    needs: version-patch
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.version-patch.outputs.new_version }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        ref: ${{ needs.version-patch.outputs.branch_name }}
        fetch-depth: 0

    - name: Update Chart.yaml
      run: |
        sed -i "s/^version: .*/version: $VERSION/" deployments/helm/dra-driver-spyre/Chart.yaml
        sed -i "s/^appVersion: .*/appVersion: \"$VERSION\"/" deployments/helm/dra-driver-spyre/Chart.yaml
        echo "Updated Chart.yaml with version $VERSION"
        cat deployments/helm/dra-driver-spyre/Chart.yaml

    - name: Update values.yaml
      run: |
        sed -i "s/tag: \".*\"/tag: \"$VERSION\"/" deployments/helm/dra-driver-spyre/values.yaml
        echo "Updated values.yaml with tag $VERSION"
        grep "tag:" deployments/helm/dra-driver-spyre/values.yaml

    - name: Commit and push changes
      uses: planetscale/ghcommit-action@25309d8005ac7c3bcd61d3fe19b69e0fe47dbdde # v0.2.20
      with:
        commit_message: "chore: update chart to ${{ env.VERSION }}"
        repo: ${{ github.repository }}
        branch: ${{ needs.version-patch.outputs.branch_name }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
