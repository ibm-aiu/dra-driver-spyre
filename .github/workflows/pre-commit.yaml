name: Ensure Pre-commit

on:
  workflow_call:
  push:
    branches:
    - main

permissions: read-all

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-python@v3
    - uses: pre-commit/action@v3.0.1
