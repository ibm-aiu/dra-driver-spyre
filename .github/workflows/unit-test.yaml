name: Perform Unit Test

on:
  pull_request:
  push:
    paths:
    - api/**
    - cmd/**
    - pkg/**
    - internal/**
    - test/**
    - go.mod
    - go.sum
    - Makefile

permissions: read-all

jobs:
  unit-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-go@v6
      with:
        go-version: '1.24.13'
    - name: Run unit test
      run: make test
